services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        # Pass VITE_PEER_* build-args so the SPA points to the self-hosted PeerJS server.
        # Override these in .env or CI to use the public PeerJS cloud instead.
        VITE_PEER_HOST: ${VITE_PEER_HOST:-}
        VITE_PEER_PORT: ${VITE_PEER_PORT:-9000}
        VITE_PEER_PATH: ${VITE_PEER_PATH:-/}
        # Supabase lobby (required for online multiplayer room list)
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        # Telegram Mini App bot username (for invite deep-links)
        VITE_TG_BOT_USERNAME: ${VITE_TG_BOT_USERNAME:-}
        # LLM Bot: URL of the MCP server as seen by the browser inside Docker
        # When using the mcp service below: http://localhost:3333 (host network)
        # or http://mcp:3333 if the SPA is served from within the Docker network
        VITE_MCP_URL: ${VITE_MCP_URL:-http://localhost:3333}
    image: resident-blackjack:latest
    container_name: resident-blackjack
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      peerjs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      com.resident-blackjack.description: "RE7 21 card game — static SPA"

  # Optional self-hosted PeerJS signalling server.
  # Remove the `depends_on` block above and this service if you prefer the public PeerJS cloud.
  peerjs:
    image: peerjs/peerjs-server:latest
    container_name: resident-blackjack-peerjs
    ports:
      - "9000:9000"
    command: ["--port", "9000", "--path", "/"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      com.resident-blackjack.description: "PeerJS WebRTC signalling server"

  # Optional LLM Bot MCP server.
  # Required for "Play vs Claude AI" mode.
  # Set ANTHROPIC_API_KEY in your .env file before starting.
  # Remove this service (and the VITE_MCP_URL build arg above) if you don't need LLM mode.
  mcp:
    build:
      context: ./mcp-server
      dockerfile_inline: |
        FROM node:22-alpine
        WORKDIR /app
        COPY package.json package-lock.json* ./
        RUN npm ci --omit=dev
        COPY . .
        CMD ["node", "index.js"]
    container_name: resident-blackjack-mcp
    ports:
      - "3333:3333"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required for the mcp service}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-haiku-20241022}
      MCP_PORT: 3333
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      com.resident-blackjack.description: "LLM bot MCP server (Anthropic API)"
