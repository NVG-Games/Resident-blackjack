server {
    listen 80;
    server_name _;

    # Hide nginx version from Server header and error pages
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-term caching
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other routes → SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header Permissions-Policy "geolocation=()"   always;

    # Content-Security-Policy
    # Sources allowed:
    #   - self: all same-origin assets (JS, CSS, images, fonts)
    #   - telegram.org: Telegram Mini App SDK script
    #   - fonts.googleapis.com / fonts.gstatic.com: Google Fonts CSS + WOFF2
    #   - *.supabase.co: Supabase REST/Realtime API calls (wss:// for Realtime)
    #   - 0.peerjs.com / *.peerjs.com: PeerJS cloud signalling (if self-hosted, add your domain)
    #   - wss: / https: for WebRTC signalling and Supabase Realtime
    # No unsafe-inline, no unsafe-eval. Vite inlines no scripts in production builds.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' https://telegram.org; "
        "style-src 'self' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com; "
        "img-src 'self' data: blob:; "
        "connect-src 'self' https://*.supabase.co wss://*.supabase.co https://0.peerjs.com wss://0.peerjs.com https://*.peerjs.com wss://*.peerjs.com; "
        "media-src 'none'; "
        "object-src 'none'; "
        "frame-ancestors 'self' https://web.telegram.org; "
        "base-uri 'self'; "
        "form-action 'none';"
        always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
